name: Unzip website ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract website
        run: |
          set -e

          ZIP_FILE="iiti-spark-github-ready.zip"
          TEMP_DIR="/tmp/iiti-spark-extracted"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: $ZIP_FILE was not found."
            echo "Files currently in repository:"
            ls -la
            exit 1
          fi

          mkdir -p "$TEMP_DIR"
          unzip -o "$ZIP_FILE" -d "$TEMP_DIR"

          echo "Extracted files:"
          find "$TEMP_DIR" -maxdepth 3 -type f | head -100

          # The ZIP normally contains an iiti-spark folder.
          if [ -d "$TEMP_DIR/iiti-spark" ]; then
            SOURCE_DIR="$TEMP_DIR/iiti-spark"
          else
            SOURCE_DIR="$TEMP_DIR"
          fi

          # Copy normal and hidden files, including .github.
          cp -a "$SOURCE_DIR"/. .

          # Remove the uploaded ZIP.
          rm -f "$ZIP_FILE"

          echo "Repository after extraction:"
          ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No new changes were found."
          else
            git commit -m "Extract IITI Spark website"
            git push
          fi
