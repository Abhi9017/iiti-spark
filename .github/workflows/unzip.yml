name: Unzip Website

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          set -e

          ZIP_FILE="iiti-spark-github-ready.zip"
          TEMP_DIR="/tmp/iiti-spark-extracted"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ZIP file not found."
            ls -la
            exit 1
          fi

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          unzip -o "$ZIP_FILE" -d "$TEMP_DIR"

          if [ -d "$TEMP_DIR/iiti-spark" ]; then
            SOURCE_DIR="$TEMP_DIR/iiti-spark"
          else
            SOURCE_DIR="$TEMP_DIR"
          fi

          # Avoid workflow permission error
          rm -rf "$SOURCE_DIR/.github/workflows"

          # Copy all website files
          cp -a "$SOURCE_DIR"/. .

          # Remove ZIP
          rm -f "$ZIP_FILE"

          echo "Final repository files:"
          ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Extract website files"
            git push origin main
          fi
