name: Unzip Website

on:
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

          - name: Commit extracted files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -A

        if git diff --cached --quiet; then
          echo "No new changes were found."
        else
          git fetch origin main
          git rebase origin/main
          git commit -m "Extract IITI Spark website"
          git push
        fi

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          unzip -o "$ZIP_FILE" -d "$TEMP_DIR"

          if [ -d "$TEMP_DIR/iiti-spark" ]; then
            SOURCE_DIR="$TEMP_DIR/iiti-spark"
          else
            SOURCE_DIR="$TEMP_DIR"
          fi

          # Copy all files, including hidden files.
          cp -a "$SOURCE_DIR"/. .

          # IMPORTANT:
          # Keep unzip.yml but remove other extracted workflow files.
          mkdir -p .github/workflows
          find .github/workflows \
            -maxdepth 1 \
            -type f \
            ! -name "unzip.yml" \
            -delete

          # Remove ZIP only after successful extraction.
          rm -f "$ZIP_FILE"

          echo "Final repository contents:"
          find . -maxdepth 3 -type f | sort

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Extract IITI Spark website"
            git push origin main
          fi
