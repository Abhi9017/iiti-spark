name: Unzip Website

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP safely
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="iiti-spark-github-ready.zip"
          TEMP_DIR="/tmp/iiti-spark-extracted"
          SAVED_WORKFLOW="/tmp/unzip.yml"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: $ZIP_FILE was not found in the repository root."
            echo "Current repository files:"
            ls -la
            exit 1
          fi

          # Preserve the current unzip workflow.
          cp ".github/workflows/unzip.yml" "$SAVED_WORKFLOW"

          # Prepare temporary extraction directory.
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          # Extract the ZIP.
          unzip -q -o "$ZIP_FILE" -d "$TEMP_DIR"

          # Detect whether the ZIP contains an iiti-spark folder.
          if [ -d "$TEMP_DIR/iiti-spark" ]; then
            SOURCE_DIR="$TEMP_DIR/iiti-spark"
          else
            SOURCE_DIR="$TEMP_DIR"
          fi

          echo "Using source directory: $SOURCE_DIR"

          # Remove workflows included inside the ZIP.
          # This prevents pages.yml permission errors.
          rm -rf "$SOURCE_DIR/.github/workflows"

          # Copy all normal and hidden files.
          cp -a "$SOURCE_DIR"/. .

          # Remove every workflow and restore only unzip.yml.
          rm -rf ".github/workflows"
          mkdir -p ".github/workflows"
          cp "$SAVED_WORKFLOW" ".github/workflows/unzip.yml"

          # Delete the uploaded ZIP after extraction.
          rm -f "$ZIP_FILE"

          echo "Final repository contents:"
          find . -maxdepth 3 -type f | sort

      - name: Commit extracted files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Extract IITI Spark website"
            git push origin HEAD:main
          fi
