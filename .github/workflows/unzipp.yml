name: Unzip Website

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract ZIP safely
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="iiti-spark-github-ready.zip"
          TEMP_DIR="/tmp/iiti-spark-extracted"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "ERROR: $ZIP_FILE is not in the repository root."
            echo "Current repository files:"
            ls -la
            exit 1
          fi

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          unzip -q "$ZIP_FILE" -d "$TEMP_DIR"

          if [ -d "$TEMP_DIR/iiti-spark" ]; then
            SOURCE_DIR="$TEMP_DIR/iiti-spark"
          else
            SOURCE_DIR="$TEMP_DIR"
          fi

          # Remove workflow files from the ZIP before copying.
          # This prevents the pages.yml permission error.
          rm -rf "$SOURCE_DIR/.github/workflows"

          # Copy all normal and hidden website files.
          cp -a "$SOURCE_DIR"/. .

          # Delete the ZIP after extraction.
          rm -f "$ZIP_FILE"

          echo "Extracted files:"
          find . -maxdepth 3 -type f | sort

      - name: Commit extracted website
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Extract IITI Spark website"
          git push origin HEAD:main
